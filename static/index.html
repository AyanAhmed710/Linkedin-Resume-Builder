<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Builder — LinkedIn Scraper & Smart Resume Generator</title>
    <meta name="description" content="Scrape LinkedIn jobs and generate AI-tailored resumes automatically with LangChain-powered intelligence.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <!-- ═══ Ambient background ═══ -->
    <div class="ambient">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- ═══ Header ═══ -->
    <header id="main-header">
        <div class="header-inner">
            <div class="logo" id="logo">
                <div class="logo-icon-wrap">
                    <span class="logo-icon">⚡</span>
                </div>
                <div class="logo-text">
                    <h1>ResumeForge AI</h1>
                    <span class="logo-sub">LinkedIn Scraper &amp; Resume Generator</span>
                </div>
            </div>

            <nav class="tab-nav" id="tab-nav">
                <button class="tab-btn active" data-tab="scraper" id="tab-scraper-btn">
                    <svg class="tab-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <span>Job Scraper</span>
                </button>
                <button class="tab-btn" data-tab="generator" id="tab-generator-btn">
                    <svg class="tab-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    <span>Resume Generator</span>
                </button>
                <div class="tab-slider" id="tab-slider"></div>
            </nav>
        </div>
    </header>

    <!-- ═══ Main content ═══ -->
    <main id="main-content">

        <!-- ──────────────────── SCRAPER TAB ──────────────────── -->
        <section class="tab-panel active" id="panel-scraper">
            <div class="panel-grid two-col">

                <!-- Config card -->
                <div class="glass-card" id="scraper-config-card">
                    <div class="card-head">
                        <div class="card-title-row">
                            <div class="card-icon-wrap accent-cyan">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                            </div>
                            <h2>Scraper Configuration</h2>
                        </div>
                        <span class="badge badge-cyan">Step 1</span>
                    </div>

                    <div class="card-body">
                        <div class="field" id="field-keyword">
                            <label for="inp-keyword">Search Keyword</label>
                            <div class="input-wrap">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                <input type="text" id="inp-keyword" placeholder="e.g.  AI Engineer, Data Scientist" value="AI engineer">
                            </div>
                        </div>

                        <div class="field" id="field-countries">
                            <label for="inp-countries">Countries <span class="hint">(comma-separated)</span></label>
                            <div class="input-wrap">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                                <input type="text" id="inp-countries" placeholder="e.g.  Belgium, Netherlands, Germany" value="Belgium, Netherlands">
                            </div>
                        </div>

                        <div class="field-row">
                            <div class="field" id="field-count">
                                <label for="inp-count">Jobs / Country</label>
                                <div class="input-wrap">
                                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                                    <input type="number" id="inp-count" value="5" min="1" max="50">
                                </div>
                            </div>
                            <div class="field" id="field-date">
                                <label for="inp-date">Date Posted</label>
                                <div class="input-wrap select-wrap">
                                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                    <select id="inp-date">
                                        <option value="24h">Last 24 Hours</option>
                                        <option value="week" selected>Past Week</option>
                                        <option value="month">Past Month</option>
                                        <option value="any">Any Time</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <button class="btn btn-primary" id="btn-scrape">
                            <span class="btn-content">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                Start Scraping
                            </span>
                            <span class="btn-loader hidden">
                                <span class="spinner"></span> Scraping…
                            </span>
                        </button>
                    </div>
                </div>

                <!-- Terminal card -->
                <div class="glass-card terminal-card" id="scraper-terminal-card">
                    <div class="card-head">
                        <div class="card-title-row">
                            <div class="card-icon-wrap accent-green">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                            </div>
                            <h2>Live Terminal</h2>
                        </div>
                        <div class="traffic-lights">
                            <span class="tl red"></span>
                            <span class="tl yellow"></span>
                            <span class="tl green"></span>
                        </div>
                    </div>
                    <div class="terminal" id="scraper-term">
                        <div class="term-line dim"><span class="prompt">❯</span> Waiting for scraping task…</div>
                    </div>
                </div>
            </div>

            <!-- Scraper result -->
            <div class="glass-card result-card hidden" id="scraper-result">
                <div class="card-head">
                    <div class="card-title-row">
                        <div class="card-icon-wrap accent-purple">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        </div>
                        <h2>Scraping Complete</h2>
                    </div>
                </div>
                <div class="card-body" id="scraper-result-body"></div>
            </div>
        </section>

        <!-- ──────────────────── GENERATOR TAB ──────────────────── -->
        <section class="tab-panel" id="panel-generator">

            <!-- Upload card -->
            <div class="glass-card" id="upload-card">
                <div class="card-head">
                    <div class="card-title-row">
                        <div class="card-icon-wrap accent-purple">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        </div>
                        <h2>Upload Job CSV</h2>
                    </div>
                    <span class="badge badge-purple">Step 2</span>
                </div>
                <div class="card-body">
                    <div class="drop-zone" id="drop-zone">
                        <div class="drop-zone-inner">
                            <svg class="drop-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="12" y="8" width="40" height="48" rx="4"/>
                                <line x1="22" y1="24" x2="42" y2="24"/><line x1="22" y1="32" x2="42" y2="32"/><line x1="22" y1="40" x2="34" y2="40"/>
                            </svg>
                            <p class="drop-primary">Drag &amp; drop your CSV here</p>
                            <p class="drop-secondary">or <button class="link-btn" id="browse-btn">browse files</button></p>
                            <input type="file" id="file-input" accept=".csv" hidden>
                        </div>
                    </div>
                    <div class="upload-info hidden" id="upload-info">
                        <div class="file-chip" id="file-chip">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                            <span id="file-name"></span>
                            <button class="chip-close" id="file-remove" title="Remove file">&times;</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CSV preview -->
            <div class="glass-card hidden" id="csv-preview-card">
                <div class="card-head">
                    <div class="card-title-row">
                        <div class="card-icon-wrap accent-cyan">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                        </div>
                        <h2>CSV Preview</h2>
                    </div>
                    <span class="badge badge-cyan" id="csv-row-count"></span>
                </div>
                <div class="card-body table-scroll">
                    <table class="data-table" id="csv-table">
                        <thead id="csv-thead"></thead>
                        <tbody id="csv-tbody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Generate button -->
            <div class="action-bar hidden" id="generate-bar">
                <button class="btn btn-primary btn-lg" id="btn-generate">
                    <span class="btn-content">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                        Generate Tailored Resumes
                    </span>
                    <span class="btn-loader hidden">
                        <span class="spinner"></span> Generating…
                    </span>
                </button>
            </div>

            <!-- Generator terminal -->
            <div class="glass-card terminal-card hidden" id="gen-terminal-card">
                <div class="card-head">
                    <div class="card-title-row">
                        <div class="card-icon-wrap accent-green">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                        </div>
                        <h2>Generation Logs</h2>
                    </div>
                    <div class="traffic-lights">
                        <span class="tl red"></span>
                        <span class="tl yellow"></span>
                        <span class="tl green"></span>
                    </div>
                </div>
                <div class="terminal" id="gen-term"></div>
            </div>

            <!-- Generated PDFs -->
            <div class="glass-card hidden" id="pdf-result-card">
                <div class="card-head">
                    <div class="card-title-row">
                        <div class="card-icon-wrap accent-purple">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        </div>
                        <h2>Generated Resumes</h2>
                    </div>
                </div>
                <div class="card-body" id="pdf-list"></div>
            </div>
        </section>
    </main>

    <!-- ═══ Toast container ═══ -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/js/app.js"></script>
</body>
</html>
